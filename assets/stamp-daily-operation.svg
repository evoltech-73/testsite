<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="日々の運用向け">
  <defs>
    <filter id="rough-daily">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="22"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
    <mask id="distress-daily">
      <rect width="128" height="128" fill="white"/>
      <g fill="black" opacity=".45">
        <circle cx="31" cy="29" r="3"/><circle cx="96" cy="35" r="2.5"/><circle cx="105" cy="83" r="3"/>
        <circle cx="34" cy="99" r="2.5"/><circle cx="75" cy="101" r="3"/><circle cx="56" cy="24" r="2"/>
        <rect x="18" y="70" width="23" height="3" rx="1.5" transform="rotate(-13 29.5 71.5)"/>
        <rect x="79" y="47" width="22" height="3" rx="1.5" transform="rotate(15 90 48.5)"/>
        <rect x="45" y="85" width="17" height="2.5" rx="1.2" transform="rotate(17 53 86)"/>
      </g>
    </mask>
  </defs>
  <g transform="rotate(-10 64 64)" filter="url(#rough-daily)" mask="url(#distress-daily)" fill="none" stroke="#d9471e" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="64" cy="64" r="48" stroke-width="8"/>
    <circle cx="64" cy="64" r="39" stroke-width="2.8" stroke-dasharray="8 6"/>
    <path d="M32 38c18-10 45-12 65 1M30 90c21 9 47 11 68-1" stroke-width="3" opacity=".75"/>
  </g>
  <g transform="rotate(-10 64 64)" fill="#d9471e" font-family="Yu Gothic, Meiryo, sans-serif" font-weight="900" text-anchor="middle" mask="url(#distress-daily)">
    <text x="64" y="52" font-size="19">日々の</text>
    <text x="64" y="73" font-size="20">運用</text>
    <text x="64" y="92" font-size="17">向け</text>
  </g>
</svg>
