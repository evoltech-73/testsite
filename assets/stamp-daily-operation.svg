<svg xmlns="http://www.w3.org/2000/svg" width="132" height="132" viewBox="0 0 132 132" role="img" aria-label="日々の運用向け">
  <defs>
    <filter id="stamp-rough-daily">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="4" seed="52"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
    <mask id="stamp-ink-daily">
      <rect width="132" height="132" fill="white"/>
      <g fill="black" opacity=".62">
        <circle cx="31" cy="25" r="5"/><circle cx="95" cy="29" r="4"/><circle cx="112" cy="67" r="3"/>
        <circle cx="101" cy="105" r="5"/><circle cx="59" cy="112" r="4"/><circle cx="24" cy="77" r="4"/>
        <rect x="20" y="42" width="32" height="5" rx="2" transform="rotate(-17 36 44)"/>
        <rect x="72" y="30" width="35" height="5" rx="2" transform="rotate(13 89 32)"/>
        <rect x="31" y="93" width="41" height="5" rx="2" transform="rotate(10 51 95)"/>
        <rect x="78" y="76" width="31" height="4" rx="2" transform="rotate(-16 93 78)"/>
        <rect x="43" y="59" width="19" height="4" rx="2" transform="rotate(-11 52 61)"/>
      </g>
    </mask>
  </defs>
  <g transform="rotate(-11 66 66)" filter="url(#stamp-rough-daily)" mask="url(#stamp-ink-daily)" fill="none" stroke="#cf3f1b" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="66" cy="66" r="50" stroke-width="9"/>
    <circle cx="66" cy="66" r="38" stroke-width="3" stroke-dasharray="7 6"/>
  </g>
  <g transform="rotate(-11 66 66)" fill="#cf3f1b" font-family="Yu Gothic, Meiryo, sans-serif" font-weight="900" text-anchor="middle" mask="url(#stamp-ink-daily)">
    <text x="66" y="56" font-size="19">日々の</text>
    <text x="66" y="77" font-size="21">運用</text>
    <text x="66" y="96" font-size="17">向け</text>
  </g>
</svg>
