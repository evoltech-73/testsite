<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="業務に合わせる">
  <defs>
    <filter id="rough-custom">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="33"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
    <mask id="distress-custom">
      <rect width="128" height="128" fill="white"/>
      <g fill="black" opacity=".45">
        <circle cx="27" cy="36" r="3"/><circle cx="91" cy="27" r="2.5"/><circle cx="108" cy="72" r="3"/>
        <circle cx="39" cy="101" r="2.5"/><circle cx="80" cy="102" r="3"/><circle cx="59" cy="21" r="2"/>
        <rect x="20" y="77" width="22" height="3" rx="1.5" transform="rotate(-15 31 78.5)"/>
        <rect x="78" y="42" width="25" height="3" rx="1.5" transform="rotate(19 90 43.5)"/>
        <rect x="48" y="58" width="18" height="2.5" rx="1.2" transform="rotate(-18 57 59)"/>
      </g>
    </mask>
  </defs>
  <g transform="rotate(-10 64 64)" filter="url(#rough-custom)" mask="url(#distress-custom)" fill="none" stroke="#d9471e" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="64" cy="64" r="48" stroke-width="8"/>
    <circle cx="64" cy="64" r="39" stroke-width="2.8" stroke-dasharray="8 6"/>
    <path d="M32 38c18-10 45-12 65 1M30 90c21 9 47 11 68-1" stroke-width="3" opacity=".75"/>
  </g>
  <g transform="rotate(-10 64 64)" fill="#d9471e" font-family="Yu Gothic, Meiryo, sans-serif" font-weight="900" text-anchor="middle" mask="url(#distress-custom)">
    <text x="64" y="56" font-size="19">業務に</text>
    <text x="64" y="79" font-size="18">合わせる</text>
  </g>
</svg>
