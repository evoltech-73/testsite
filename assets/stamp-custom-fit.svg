<svg xmlns="http://www.w3.org/2000/svg" width="132" height="132" viewBox="0 0 132 132" role="img" aria-label="業務に合わせる">
  <defs>
    <filter id="stamp-rough-custom">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="4" seed="63"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
    <mask id="stamp-ink-custom">
      <rect width="132" height="132" fill="white"/>
      <g fill="black" opacity=".62">
        <circle cx="28" cy="31" r="5"/><circle cx="96" cy="26" r="4"/><circle cx="112" cy="63" r="3"/>
        <circle cx="104" cy="103" r="5"/><circle cx="58" cy="110" r="4"/><circle cx="22" cy="84" r="4"/>
        <rect x="18" y="41" width="31" height="5" rx="2" transform="rotate(-19 33 43)"/>
        <rect x="73" y="28" width="34" height="5" rx="2" transform="rotate(12 90 30)"/>
        <rect x="30" y="92" width="42" height="5" rx="2" transform="rotate(8 51 94)"/>
        <rect x="80" y="74" width="30" height="4" rx="2" transform="rotate(-19 95 76)"/>
        <rect x="41" y="61" width="19" height="4" rx="2" transform="rotate(-10 50 63)"/>
      </g>
    </mask>
  </defs>
  <g transform="rotate(-11 66 66)" filter="url(#stamp-rough-custom)" mask="url(#stamp-ink-custom)" fill="none" stroke="#cf3f1b" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="66" cy="66" r="50" stroke-width="9"/>
    <circle cx="66" cy="66" r="38" stroke-width="3" stroke-dasharray="7 6"/>
  </g>
  <g transform="rotate(-11 66 66)" fill="#cf3f1b" font-family="Yu Gothic, Meiryo, sans-serif" font-weight="900" text-anchor="middle" mask="url(#stamp-ink-custom)">
    <text x="66" y="62" font-size="20">業務に</text>
    <text x="66" y="85" font-size="19">合わせる</text>
  </g>
</svg>
