<svg xmlns="http://www.w3.org/2000/svg" width="132" height="132" viewBox="0 0 132 132" role="img" aria-label="小さく始める">
  <defs>
    <filter id="stamp-rough-small">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="4" seed="41"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
    <mask id="stamp-ink-small">
      <rect width="132" height="132" fill="white"/>
      <g fill="black" opacity=".62">
        <circle cx="29" cy="27" r="5"/><circle cx="98" cy="24" r="4"/><circle cx="111" cy="58" r="3"/>
        <circle cx="105" cy="101" r="5"/><circle cx="56" cy="111" r="4"/><circle cx="22" cy="82" r="4"/>
        <rect x="18" y="40" width="30" height="5" rx="2" transform="rotate(-19 33 42)"/>
        <rect x="72" y="28" width="34" height="5" rx="2" transform="rotate(12 89 30)"/>
        <rect x="30" y="92" width="42" height="5" rx="2" transform="rotate(9 51 94)"/>
        <rect x="80" y="73" width="29" height="4" rx="2" transform="rotate(-18 94 75)"/>
        <rect x="39" y="61" width="18" height="4" rx="2" transform="rotate(-10 48 63)"/>
      </g>
    </mask>
  </defs>
  <g transform="rotate(-11 66 66)" filter="url(#stamp-rough-small)" mask="url(#stamp-ink-small)" fill="none" stroke="#cf3f1b" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="66" cy="66" r="50" stroke-width="9"/>
    <circle cx="66" cy="66" r="38" stroke-width="3" stroke-dasharray="7 6"/>
  </g>
  <g transform="rotate(-11 66 66)" fill="#cf3f1b" font-family="Yu Gothic, Meiryo, sans-serif" font-weight="900" text-anchor="middle" mask="url(#stamp-ink-small)">
