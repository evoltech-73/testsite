<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="小さく始める">
  <defs>
    <filter id="rough-small">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
    <mask id="distress-small">
      <rect width="128" height="128" fill="white"/>
      <g fill="black" opacity=".45">
        <circle cx="28" cy="34" r="3"/><circle cx="94" cy="31" r="2.5"/><circle cx="107" cy="67" r="3"/>
        <circle cx="40" cy="97" r="2.5"/><circle cx="76" cy="104" r="3"/><circle cx="61" cy="22" r="2"/>
        <rect x="19" y="79" width="20" height="3" rx="1.5" transform="rotate(-12 29 80.5)"/>
        <rect x="81" y="41" width="24" height="3" rx="1.5" transform="rotate(18 93 42.5)"/>
        <rect x="39" y="58" width="16" height="2.5" rx="1.2" transform="rotate(-18 47 59)"/>
